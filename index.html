<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رابطہ آئمہ مساجد پنجاب - FULL EXTRA NEXT</title>

<style>
body{
font-family:Arial;
margin:0;
background:#eef2f5;
}

/* HEADER */
header{
background:linear-gradient(90deg,#0B5D3B,#06402a);
color:white;
text-align:center;
padding:15px;
}

/* SEARCH */
.search-box{
background:white;
padding:10px;
text-align:center;
}

.search-box input{
width:92%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
outline:none;
}

/* CARD */
.card{
background:white;
margin:10px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
border-right:5px solid #0B5D3B;
}

.name{
color:#0B5D3B;
font-weight:bold;
font-size:18px;
}

.small{
font-size:14px;
color:#444;
line-height:1.6;
margin-top:5px;
}

/* BUTTONS */
.btn{
display:inline-block;
margin-top:8px;
padding:7px 10px;
border-radius:6px;
font-size:12px;
text-decoration:none;
color:white;
}

.whatsapp{background:#25D366;}
.call{background:#007bff;}

/* PAGINATION */
.pagination{
text-align:center;
padding:10px;
}

.pagination button{
padding:6px 10px;
margin:2px;
border:none;
background:#0B5D3B;
color:white;
border-radius:6px;
cursor:pointer;
}

/* STATUS */
.status{
text-align:center;
padding:10px;
font-size:14px;
color:#555;
}
.highlight{
background:yellow;
padding:0 2px;
}
</style>
</head>

<body>

<header>
<h2>رابطہ آئمہ مساجد پنجاب</h2>
<p>FULL EXTRA NEXT SYSTEM 🚀</p>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="تلاش کریں..." oninput="debounceSearch()">
</div>

<div class="status" id="status">Loading data...</div>

<div id="data"></div>

<div class="pagination" id="pagination"></div>

<script>

let allData = [];
let filteredData = [];
let currentPage = 1;
let perPage = 10;

const sheetURL = "https://docs.google.com/spreadsheets/d/1smpwvDyoyVkeFUcFTr8yCNrDHyZuXAxYy5uirBgCTQU/export?format=csv";

async function loadData(){
try{
document.getElementById("status").innerText = "Loading data...";

let res = await fetch(sheetURL);
let text = await res.text();

let rows = text.trim().split("\n").map(r => r.split(","));
rows.shift();

allData = rows.map(r => ({
name: r[1],
phone: r[2],
mosque: r[3],
tehsil: r[4],
district: r[5]
}));

filteredData = allData;

document.getElementById("status").innerText =
"Total Records: " + allData.length;

render();

}catch(e){
document.getElementById("status").innerText =
"Error loading data... retrying";
setTimeout(loadData, 3000);
}
}

function highlight(text, term){
if(!term) return text;
return text.replaceAll(term,
`<span class="highlight">${term}</span>`);
}

function render(){

let start = (currentPage-1)*perPage;
let end = start + perPage;

let pageData = filteredData.slice(start, end);

if(pageData.length === 0){
document.getElementById("data").innerHTML =
"<div class='status'>No results found</div>";
return;
}

let searchVal = document.getElementById("search").value.toLowerCase();

let html = "";

pageData.forEach(i => {

let wa = i.phone ? `https://wa.me/92${i.phone.replace(/^0/, "")}` : "#";

html += `
<div class="card">
<div class="name">${highlight(i.name || "", searchVal)}</div>

<div class="small">
مسجد: ${highlight(i.mosque || "", searchVal)}<br>
تحصیل: ${highlight(i.tehsil || "", searchVal)}<br>
ضلع: ${highlight(i.district || "", searchVal)}<br>
رابطہ: ${i.phone || ""}
</div>

<a class="btn whatsapp" href="${wa}" target="_blank">WhatsApp</a>
<a class="btn call" href="tel:${i.phone || ''}">Call</a>
</div>
`;
});

document.getElementById("data").innerHTML = html;
renderPagination();
}

function renderPagination(){

let pages = Math.ceil(filteredData.length / perPage);
let html = "";

for(let i=1;i<=pages;i++){
html += `<button onclick="goPage(${i})">${i}</button>`;
}

document.getElementById("pagination").innerHTML = html;
}

function goPage(p){
currentPage = p;
render();
}

// SMART DEBOUNCE SEARCH
let timer;

function debounceSearch(){
clearTimeout(timer);

timer = setTimeout(()=>{

let val = document.getElementById("search").value.toLowerCase();

filteredData = allData.filter(i =>
(i.name || "").toLowerCase().includes(val) ||
(i.mosque || "").toLowerCase().includes(val) ||
(i.district || "").toLowerCase().includes(val) ||
(i.tehsil || "").toLowerCase().includes(val)
);

currentPage = 1;
render();

}, 250);
}

loadData();

</script>

</body>
</html>
