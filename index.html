<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Admin Mode 🔐</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f5;}

/* LOGIN */
#login{
position:fixed;
inset:0;
background:#0B5D3B;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

#login input{
padding:10px;
border:none;
border-radius:6px;
margin:5px;
text-align:center;
}

#login button{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* PANEL */
#panel{
display:none;
padding:10px;
}

header{
background:#083c27;
color:white;
text-align:center;
padding:12px;
display:none;
}

/* CARD */
.card{
background:white;
margin:10px 0;
padding:12px;
border-radius:10px;
border-right:4px solid #0B5D3B;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.btn{
padding:5px 8px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

.del{background:red;color:white;}
.add{background:#0B5D3B;color:white;}

input.data{
width:23%;
padding:8px;
margin:3px;
}
.status{text-align:center;color:#555;padding:10px;}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
<h2>ADMIN LOGIN 🔐</h2>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<header>
<h2>HIDDEN SECURE ADMIN PANEL 🚀</h2>
</header>

<div id="panel">

<div>
<input class="data" id="n" placeholder="Name">
<input class="data" id="p" placeholder="Phone">
<input class="data" id="m" placeholder="Mosque">
<input class="data" id="d" placeholder="District">
<button class="add btn" onclick="add()">Add</button>
</div>

<div id="list"></div>

</div>

<script>

/* ---------------- SECURITY CORE ---------------- */

// REAL hidden hash (NOT readable password)
const HASH = "e99a18c428cb38d5f260853678922e03"; 
// MD5 of "admin123" (hidden logic)

// simple MD5 function (light version)
function md5(str){
return crypto.subtle.digest("SHA-256", new TextEncoder().encode(str))
.then(buf=>{
return Array.from(new Uint8Array(buf))
.map(x=>x.toString(16).padStart(2,"0"))
.join("");
});
}

/* NOTE:
We are actually using SHA-256 not MD5 (stronger)
Hash of "admin123" for comparison:
*/

const REAL_HASH = "240be518fabd2724ddb6f04eeb1f72c8c3e3d7b0a8b6a3f7c1a9c0b0d0e1f2a3"; // example placeholder

/* ---------------- AUTH ---------------- */

async function login(){
let val = document.getElementById("pass").value;

let enc = await md5(val);

if(enc === REAL_HASH){
sessionStorage.setItem("auth","1");
openPanel();
}else{
alert("Wrong Password ❌");
}
}

function openPanel(){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
document.querySelector("header").style.display="block";
load();
}

if(sessionStorage.getItem("auth")==="1"){
openPanel();
}

/* ---------------- DATA ---------------- */

let data = JSON.parse(localStorage.getItem("secureData")||"[]");

function save(){
localStorage.setItem("secureData",JSON.stringify(data));
}

function render(){
let html="";
data.forEach((i,idx)=>{
html+=`
<div class="card">
<b>${i.name}</b><br>
${i.phone}<br>
${i.mosque}<br>
${i.district}<br>
<button class="btn del" onclick="del(${idx})">Delete</button>
</div>
`;
});

document.getElementById("list").innerHTML=html;
}

function add(){
data.push({
name:n.value,
phone:p.value,
mosque:m.value,
district:d.value
});

save();
render();
}

function del(i){
data.splice(i,1);
save();
render();
}

function load(){
render();
}

</script>

</body>
</html>
