<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رابطہ آئمہ مساجد پنجاب - PRO MAX</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f5;}
header{background:#0B5D3B;color:white;padding:15px;text-align:center;}

.search-box{padding:10px;background:white;text-align:center;}
.search-box input{
width:90%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:5px;
justify-content:center;
padding:10px;
background:#fff;
}

.filters button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#0B5D3B;
color:white;
font-size:12px;
cursor:pointer;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.name{
color:#0B5D3B;
font-weight:bold;
font-size:18px;
}

.small{
font-size:14px;
color:#444;
line-height:1.6;
margin-top:5px;
}

.btns{
margin-top:10px;
display:flex;
gap:5px;
flex-wrap:wrap;
}

.btn{
padding:6px 10px;
border-radius:6px;
font-size:12px;
text-decoration:none;
color:white;
}

.whatsapp{background:#25D366;}
.call{background:#007bff;}
.copy{background:#555;}

#loading{text-align:center;padding:10px;color:#666;}
#notfound{text-align:center;padding:15px;color:red;display:none;}
</style>
</head>

<body>

<header>
<h2>رابطہ آئمہ مساجد پنجاب</h2>
<p>PRO MAX Live System</p>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="تلاش کریں..." onkeyup="smartSearch()">
</div>

<div class="filters">
<button onclick="filterDistrict('')">All</button>
<button onclick="filterDistrict('ڈیرہ غازی خان')">DG Khan</button>
<button onclick="filterDistrict('ٹوبہ ٹیک سنگھ')">Toba</button>
<button onclick="filterDistrict('گوجرہ')">Gojra</button>
</div>

<div id="loading">لوڈ ہو رہا ہے...</div>
<div id="notfound">کوئی نتیجہ نہیں ملا</div>
<div id="data"></div>

<script>

let allData = [];
let currentFilter = "";

const sheetURL = "https://docs.google.com/spreadsheets/d/1smpwvDyoyVkeFUcFTr8yCNrDHyZuXAxYy5uirBgCTQU/export?format=csv";

fetch(sheetURL)
.then(res => res.text())
.then(text => {

    let rows = text.trim().split("\n").map(r => r.split(","));
    rows.shift();

    allData = rows.map(r => ({
        name: r[1],
        phone: r[2],
        mosque: r[3],
        tehsil: r[4],
        district: r[5]
    }));

    document.getElementById("loading").style.display = "none";
    showData(allData);
});

function showData(data){

let html = "";

if(data.length === 0){
document.getElementById("notfound").style.display = "block";
document.getElementById("data").innerHTML = "";
return;
}else{
document.getElementById("notfound").style.display = "none";
}

data.forEach(i => {

let wa = i.phone ? `https://wa.me/92${i.phone.replace(/^0/, "")}` : "#";

html += `
<div class="card">
<div class="name">${i.name || ""}</div>
<div class="small">
مسجد: ${i.mosque || ""}<br>
تحصیل: ${i.tehsil || ""}<br>
ضلع: ${i.district || ""}<br>
رابطہ: ${i.phone || ""}
</div>

<div class="btns">
<a class="btn whatsapp" href="${wa}" target="_blank">WhatsApp</a>
<a class="btn call" href="tel:${i.phone || ''}">Call</a>
<a class="btn copy" onclick="navigator.clipboard.writeText('${i.phone || ''}')">Copy</a>
</div>

</div>
`;
});

document.getElementById("data").innerHTML = html;
}

function smartSearch(){

let val = document.getElementById("search").value.toLowerCase();

let filtered = allData.filter(i =>
(i.name || "").toLowerCase().includes(val) ||
(i.mosque || "").toLowerCase().includes(val) ||
(i.district || "").toLowerCase().includes(val) ||
(i.tehsil || "").toLowerCase().includes(val)
);

if(currentFilter){
filtered = filtered.filter(i => i.district === currentFilter);
}

showData(filtered);
}

function filterDistrict(d){

currentFilter = d;

let filtered = d ? allData.filter(i => i.district === d) : allData;

showData(filtered);
}

</script>

</body>
</html>
