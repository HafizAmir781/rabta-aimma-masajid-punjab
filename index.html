<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رابطہ آئمہ مساجد پنجاب</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8;}
header{background:#0B5D3B;color:white;padding:15px;text-align:center;}
.search-box{padding:10px;background:white;text-align:center;}
.search-box input{width:90%;padding:10px;font-size:16px;}
.card{background:white;margin:10px;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.name{color:#0B5D3B;font-weight:bold;font-size:18px;}
.small{font-size:14px;color:#444;line-height:1.6;}
</style>
</head>

<body>

<header>
<h2>رابطہ آئمہ مساجد پنجاب</h2>
<p>Live Data System</p>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="تلاش کریں..." onkeyup="filter()">
</div>

<div id="data">لوڈ ہو رہا ہے...</div>

<script>

let allData = [];

const sheetURL = "https://docs.google.com/spreadsheets/d/1smpwvDyoyVkeFUcFTr8yCNrDHyZuXAxYy5uirBgCTQU/export?format=csv";

fetch(sheetURL)
.then(res => res.text())
.then(text => {

    let rows = text.trim().split("\n").map(r => r.split(","));
    rows.shift();
    rows = rows.filter(r => r.length > 1);

    allData = rows.map(r => ({
        id: r[0],
        name: r[1],
        phone: r[2],
        mosque: r[3],
        tehsil: r[4],
        district: r[5]
    }));

    show(allData);
});

function show(data){
    let html = "";

    data.forEach(i => {
        html += `
        <div class="card">
            <div class="name">${i.name || ""}</div>
            <div class="small">
                مسجد: ${i.mosque || ""}<br>
                تحصیل: ${i.tehsil || ""}<br>
                ضلع: ${i.district || ""}<br>
                رابطہ: ${i.phone || ""}
            </div>
        </div>
        `;
    });

    document.getElementById("data").innerHTML = html;
}

function filter(){
    let val = document.getElementById("search").value.toLowerCase();

    let filtered = allData.filter(i =>
        (i.name || "").toLowerCase().includes(val) ||
        (i.mosque || "").toLowerCase().includes(val) ||
        (i.district || "").toLowerCase().includes(val) ||
        (i.tehsil || "").toLowerCase().includes(val)
    );

    show(filtered);
}

</script>

</body>
</html>
