<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رابطہ آئمہ مساجد پنجاب - ADMIN MODE</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f5;}

/* LOGIN SCREEN */
#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#0B5D3B;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

#loginBox input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
width:200px;
text-align:center;
}

#loginBox button{
padding:10px 20px;
background:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* HEADER */
header{
background:#083c27;
color:white;
text-align:center;
padding:15px;
display:none;
}

/* PANEL */
.panel{
display:none;
padding:10px;
}

.search-box input{
width:95%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin:5px 0;
}

/* CARD */
.card{
background:white;
margin:10px 0;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
border-right:4px solid #0B5D3B;
}

.name{color:#0B5D3B;font-weight:bold;}

.btn{
padding:5px 8px;
font-size:12px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

.del{background:red;color:white;}
.addBox input{
width:22%;
padding:8px;
margin:3px;
}
.addBtn{
background:#0B5D3B;color:white;padding:8px;border:none;border-radius:6px;
}

.status{text-align:center;padding:10px;color:#555;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>ADMIN LOGIN 🔐</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<header>
<h2>ADMIN CONTROL PANEL 🚀</h2>
</header>

<div class="panel">

<div class="addBox">
<input id="n" placeholder="Name">
<input id="p" placeholder="Phone">
<input id="m" placeholder="Mosque">
<input id="d" placeholder="District">
<button class="addBtn" onclick="addData()">Add</button>
</div>

<div class="search-box">
<input oninput="search(this.value)" placeholder="Search...">
</div>

<div id="list"></div>

</div>

<script>

let data = [];

const PASSWORD = "admin123";

function login(){
let p = document.getElementById("pass").value;
if(p === PASSWORD){
document.getElementById("loginBox").style.display="none";
document.querySelector(".panel").style.display="block";
document.querySelector("header").style.display="block";
load();
}else{
alert("Wrong Password");
}
}

function load(){
let saved = localStorage.getItem("imamData");
if(saved){
data = JSON.parse(saved);
}
render();
}

function save(){
localStorage.setItem("imamData", JSON.stringify(data));
}

function render(){
let html = "";

data.forEach((i,index)=>{
html += `
<div class="card">
<div class="name">${i.name}</div>
<div>${i.phone}</div>
<div>${i.mosque}</div>
<div>${i.district}</div>

<button class="btn del" onclick="del(${index})">Delete</button>
</div>
`;
});

document.getElementById("list").innerHTML = html;
}

function addData(){
let obj = {
name:document.getElementById("n").value,
phone:document.getElementById("p").value,
mosque:document.getElementById("m").value,
district:document.getElementById("d").value
};

data.push(obj);
save();
render();
}

function del(i){
data.splice(i,1);
save();
render();
}

function search(v){
let f = data.filter(i =>
(i.name+i.mosque+i.district).toLowerCase().includes(v.toLowerCase())
);

let html = "";

f.forEach((i,index)=>{
html += `
<div class="card">
<div class="name">${i.name}</div>
<div>${i.phone}</div>
<div>${i.mosque}</div>
<div>${i.district}</div>
</div>
`;
});

document.getElementById("list").innerHTML = html;
}

load();

</script>

</body>
</html>
