<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رابطہ آئمہ مساجد پنجاب - GOVERNMENT MODE</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f5;}
header{background:#111;color:white;padding:15px;text-align:center;}

.login-box{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:#000000cc;
justify-content:center;
align-items:center;
}

.login-card{
background:white;
padding:20px;
border-radius:10px;
width:280px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:5px;
}

button{
padding:10px;
background:#0B5D3B;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h2>GOVERNMENT MODE SYSTEM</h2>
<p>رابطہ آئمہ مساجد پنجاب</p>
<button onclick="openLogin()">Admin Login</button>
</header>

<div class="login-box" id="loginBox">
<div class="login-card">
<h3>Admin Login</h3>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="data"></div>

<script>

let isAdmin = false;
const ADMIN_PASS = "1234";

function openLogin(){
document.getElementById("loginBox").style.display = "flex";
}

function login(){
let p = document.getElementById("pass").value;

if(p === ADMIN_PASS){
isAdmin = true;
alert("Admin Access Granted");
document.getElementById("loginBox").style.display = "none";
loadData();
}else{
alert("Wrong Password");
}
}

// demo data (next step will connect Google Sheet DB engine)
let data = [
{name:"حافظ محمد عامر", mosque:"جامع مسجد", district:"ڈیرہ غازی خان", phone:"0333xxxxxxx"},
{name:"قاری عثمان", mosque:"مسجد فاروقیہ", district:"گوجرہ", phone:"0300xxxxxxx"}
];

function loadData(){
let html = "";

data.forEach(i=>{
html += `
<div class="card">
<b>${i.name}</b><br>
${i.mosque}<br>
${i.district}<br>
${i.phone}
</div>
`;
});

document.getElementById("data").innerHTML = html;
}

loadData();

</script>

</body>
</html>
