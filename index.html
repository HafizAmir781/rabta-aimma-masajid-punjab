<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رابطہ آئمہ مساجد پنجاب</title>

<style>
body{
font-family: Arial;
background:#f5f7f5;
margin:0;
}

header{
background:#0B5D3B;
color:white;
text-align:center;
padding:20px;
}

h1{margin:0;font-size:28px;}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.search{
width:100%;
padding:10px;
margin:15px 0;
font-size:16px;
}

footer{
text-align:center;
padding:15px;
background:#0B5D3B;
color:white;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>رابطہ آئمہ مساجد پنجاب</h1>
<p>آٹو اپڈیٹڈ ڈیٹا سسٹم</p>
</header>

<div class="container">

<input class="search" type="text" id="searchBox" placeholder="نام یا مسجد تلاش کریں...">

<div id="data"></div>

</div>

<footer>
ڈویلپر: حافظ محمد عامر عزیز
</footer>

<script>
const SUPABASE_URL = "https://rnoopkuuejvpdkkhubvw.supabase.co";
const TABLE = "imam_contacts";

async function loadData(){
const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*`);
const data = await res.json();

let html = "";

data.forEach(item=>{
html += `
<div class="card">
<b>نام:</b> ${item.name || ""}<br>
<b>مسجد:</b> ${item.mosque || ""}<br>
<b>تحصیل:</b> ${item.tehsil || ""}<br>
<b>ضلع:</b> ${item.district || ""}<br>
<b>فون:</b> ${item.phone || ""}
</div>
`;
});

document.getElementById("data").innerHTML = html;
}

loadData();
</script>

</body>
</html>
