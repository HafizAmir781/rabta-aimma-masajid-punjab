<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رابطہ آئمہ مساجد پنجاب</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f8;
}

/* Header */
header{
    background:#0B5D3B;
    color:white;
    padding:20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:26px;
}

/* Container */
.container{
    padding:20px;
}

/* Card */
.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Footer */
footer{
    text-align:center;
    padding:15px;
    background:#0B5D3B;
    color:white;
    margin-top:20px;
}
</style>

</head>

<body>

<header>
    <h1>رابطہ آئمہ مساجد پنجاب</h1>
    <p>تمام مساجد کے آئمہ کا ڈیٹا ایک جگہ</p>
</header>

<div class="container">

    <div class="card">
        <h2>خوش آمدید</h2>
        <p>یہ ویب سائٹ آئمہ کرام، مسجد کے نام، شہر اور رابطہ نمبرز کے لیے تیار کی جا رہی ہے۔</p>
    </div>

    <div class="card">
        <h2>خصوصیات</h2>
        <ul>
            <li>امام مسجد کا نام</li>
            <li>مسجد کا نام</li>
            <li>شہر / ضلع</li>
            <li>رابطہ نمبر</li>
        </ul>
    </div>

</div>

<footer>
    © 2026 رابطہ آئمہ مساجد پنجاب - تمام حقوق محفوظ ہیں
</footer>

</body>
</html>
